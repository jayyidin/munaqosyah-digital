<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Ujian Munaqosyah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .font-headline { font-family: 'Manrope', sans-serif; }

        /* Penyesuaian untuk Cetak 1 Halaman A4 */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            
            /* Reset wadah utama */
            #main-content { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .pb-10 { padding-bottom: 0 !important; }
            
            /* Sembunyikan tombol cetak */
            button, .mt-10 { display: none !important; }
            
            /* Rapatkan jarak antar elemen */
            .pt-8 { padding-top: 0 !important; }
            .mb-8 { margin-bottom: 12px !important; }
            .mb-6 { margin-bottom: 12px !important; }
            .p-6, .sm\:p-8 { padding: 12px !important; }
            .mt-8 { margin-top: 12px !important; }
            .pt-6 { padding-top: 12px !important; }
            .gap-6 { gap: 12px !important; }
            
            /* Perkecil teks dan profil */
            h1 { font-size: 1.5rem !important; }
            h2 { font-size: 1.2rem !important; }
            #app-logo { height: 60px !important; margin-bottom: 8px !important; }
            .w-24, .h-24 { width: 50px !important; height: 50px !important; font-size: 1.25rem !important; }
            
            /* Grid responsif untuk rincian materi (otomatis membelah kolom jika materi banyak) */
            #scores-list {
                display: grid !important;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)) !important;
                gap: 8px !important;
            }
            
            /* Hilangkan jarak space-y-3 bawaan Tailwind */
            #scores-list > div {
                margin-top: 0 !important;
                padding: 6px 12px !important;
                page-break-inside: avoid;
            }
            .w-14 { width: 40px !important; }
            .h-10 { height: 32px !important; font-size: 0.9rem !important; }
        }
    </style>
</head>
<body class="text-slate-800 pb-10">
    <div id="loading" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-teal-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-teal-900 font-medium">Memuat Hasil Ujian...</p>
    </div>

    <div class="max-w-2xl mx-auto pt-8 px-4 sm:px-6 hidden" id="main-content">
        <!-- Header -->
        <div class="text-center mb-8">
            <img id="app-logo" src="" alt="Logo Instansi" class="h-16 sm:h-20 w-auto mx-auto mb-4 hidden object-contain">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-teal-950 font-headline" id="app-title">Hasil Ujian Munaqosyah</h1>
            <p class="text-gray-500 mt-1 font-medium" id="school-name"></p>
        </div>

        <!-- Student Card -->
        <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-gray-100 mb-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-teal-50 rounded-bl-full -z-0"></div>
            
            <div class="flex flex-col sm:flex-row items-center sm:items-start gap-6 relative z-10">
                <div class="w-24 h-24 rounded-full flex items-center justify-center text-3xl font-bold shadow-inner shrink-0" id="student-avatar"></div>
                
                <div class="text-center sm:text-left flex-1">
                    <h2 class="text-2xl font-bold text-teal-950 mb-1" id="student-name">Nama Siswa</h2>
                    <p class="text-sm text-gray-500 font-medium mb-3" id="student-info">ID • Kelas</p>
                    
                    <div class="flex flex-wrap items-center justify-center sm:justify-start gap-2">
                        <span class="px-3 py-1 bg-blue-50 text-blue-700 border border-blue-100 rounded-lg text-xs font-bold" id="exam-category">Kategori</span>
                        <span class="px-3 py-1 bg-gray-50 text-gray-600 border border-gray-200 rounded-lg text-xs font-bold" id="exam-semester">Semester</span>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-col gap-4 mt-8 pt-6 border-t border-gray-100">
                <div class="bg-gray-50 rounded-2xl p-4 text-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Nilai Rata-rata</p>
                    <p class="text-3xl font-black font-headline" id="final-score">-</p>
                </div>
                <div class="bg-blue-50/50 rounded-2xl p-4 text-center border border-blue-100 hidden" id="message-container">
                    <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-2">Catatan</p>
                    <p class="text-sm font-medium text-teal-950 leading-relaxed" id="final-message">-</p>
                </div>
            </div>
        </div>

        <!-- Scores List -->
        <h3 class="text-lg font-bold text-teal-950 mb-4 px-2 font-headline">Rincian Nilai Materi</h3>
        <div class="space-y-3" id="scores-list">
            <!-- Scores will be injected here -->
        </div>

        <div class="mt-10 text-center">
            <button onclick="window.print()" class="px-6 py-3 bg-teal-800 text-white font-bold rounded-xl shadow-md hover:bg-teal-900 transition-colors inline-flex items-center gap-2">
                <span class="material-symbols-outlined">print</span> Cetak Hasil
            </button>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = urlParams.get('id');
            const kategori = urlParams.get('kat');
            const semester = urlParams.get('sem');

            if (!studentId || !kategori || !semester) {
                document.getElementById('loading').innerHTML = '<p class="text-red-600 font-bold">Tautan Tidak Valid</p>';
                return;
            }

            try {
                // 1. Fetch App Settings
                const settingsDoc = await db.collection('appData').doc('settings').get();
                let kkm = 7.0;
                if (settingsDoc.exists) {
                    const settings = settingsDoc.data();
                    if (settings.appName) document.getElementById('app-title').innerHTML = settings.appName.replace(/<br\s*[\/]?>/gi, ' ');
                    if (settings.schoolName) document.getElementById('school-name').innerText = settings.schoolName;
                    if (settings.kkm) kkm = parseFloat(settings.kkm);
                    if (settings.logoUrl) {
                        document.getElementById('app-logo').src = settings.logoUrl;
                        document.getElementById('app-logo').classList.remove('hidden');
                    }
                }

                // 2. Fetch Student Data
                const pesertaDoc = await db.collection('dataPeserta').doc(`${semester}_${kategori}`).get();
                let peserta = null;
                if (pesertaDoc.exists) {
                    const list = pesertaDoc.data().list || [];
                    peserta = list.find(p => p.id === studentId);
                }

                // Fallback for older format
                if (!peserta) {
                    const fallbackDoc = await db.collection('dataPeserta').doc(kategori).get();
                    if (fallbackDoc.exists) {
                        const list = fallbackDoc.data().list || [];
                        peserta = list.find(p => p.id === studentId);
                    }
                }

                if (!peserta) throw new Error("Data siswa tidak ditemukan di sistem.");

                // 3. Fetch Surat/Materi for Category
                const suratDoc = await db.collection('dataSurat').doc(kategori).get();
                let materiList = [];
                if (suratDoc.exists) {
                    const data = suratDoc.data();
                    materiList = Array.isArray(data) ? data : (data.list || Object.values(data));
                }

                // 4. Fetch Scores (State Penilaian)
                const scorePrefix1 = `${semester}_${studentId}_`;
                const scorePrefix2 = `${studentId}_`; // Legacy

                // OPTIMASI: Ganti `get()` seluruh koleksi dengan query yang spesifik
                const queryNew = db.collection('statePenilaian')
                    .where(firebase.firestore.FieldPath.documentId(), '>=', scorePrefix1)
                    .where(firebase.firestore.FieldPath.documentId(), '<', scorePrefix1 + '\uf8ff');

                const queryLegacy = db.collection('statePenilaian')
                    .where(firebase.firestore.FieldPath.documentId(), '>=', scorePrefix2)
                    .where(firebase.firestore.FieldPath.documentId(), '<', scorePrefix2 + '\uf8ff');

                const [newScoresSnapshot, legacyScoresSnapshot] = await Promise.all([queryNew.get(), queryLegacy.get()]);

                const scoresMap = {};
                let totalScore = 0;
                let scoredItemsCount = 0;

                const processSnapshot = (snapshot) => {
                    snapshot.forEach(doc => {
                        const id = doc.id;
                        if (id.endsWith('_lembar')) return;

                        let surahNo = null;
                        // Cek format baru (dengan semester) terlebih dahulu
                        if (id.startsWith(scorePrefix1)) {
                            surahNo = id.substring(scorePrefix1.length);
                        } 
                        // Kemudian cek format lama, pastikan bukan format baru dari semester lain
                        else if (id.startsWith(scorePrefix2)) {
                            const underscoreCount = (id.match(/_/g) || []).length;
                            if (underscoreCount === 1) { // Format lama hanya punya 1 underscore: id_no
                                surahNo = id.substring(scorePrefix2.length);
                            }
                        }

                        if (!surahNo) return;

                        const val = doc.data().nilai;

                        if (val !== undefined && materiList.some(m => String(m.no) === String(surahNo))) {
                            if (scoresMap[surahNo] === undefined) {
                                scoresMap[surahNo] = val;
                                totalScore += val;
                                scoredItemsCount++;
                            }
                        }
                    });
                };

                processSnapshot(newScoresSnapshot);
                processSnapshot(legacyScoresSnapshot);

                // Calculate Results
                const avg = scoredItemsCount > 0 ? parseFloat((totalScore / scoredItemsCount).toFixed(1)) : 0;
                const isCompleted = scoredItemsCount === materiList.length && materiList.length > 0;
                const hasRemedial = Object.values(scoresMap).some(n => n < kkm);
                const isPassed = isCompleted && !hasRemedial && avg >= kkm;

                // Populate UI
                document.getElementById('student-avatar').innerText = peserta.inisial || '-';
                document.getElementById('student-avatar').className = `w-24 h-24 rounded-full flex items-center justify-center text-3xl font-bold shadow-inner ${peserta.warna || 'bg-gray-200 text-gray-700'}`;
                
                document.getElementById('student-name').innerText = peserta.nama;
                document.getElementById('student-info').innerText = `${peserta.id} • ${peserta.kelas}`;
                document.getElementById('exam-category').innerText = kategori;
                document.getElementById('exam-semester').innerText = `Semester ${semester}`;

                const finalScoreEl = document.getElementById('final-score');
                if (scoredItemsCount === 0) {
                    finalScoreEl.innerText = '-';
                    finalScoreEl.className = 'text-3xl font-black font-headline text-gray-400';
                } else {
                    finalScoreEl.innerText = avg;
                    finalScoreEl.className = `text-3xl font-black font-headline ${avg < kkm ? 'text-red-600' : 'text-teal-950'}`;
                }

                const messageContainer = document.getElementById('message-container');
                const finalMessage = document.getElementById('final-message');

                if (isPassed) {
                    messageContainer.classList.remove('hidden');
                    messageContainer.classList.add('flex', 'flex-col', 'justify-center');
                    finalMessage.innerText = "Barakallahu fiikum, kami ucapkan selamat. Ananda berhak melanjutkan ke tahap Ujian Munaqosyah. Diharapkan untuk segera mempersiapkan diri dengan sebaik-baiknya.";
                } else if (hasRemedial || (isCompleted && !isPassed)) {
                    messageContainer.classList.remove('hidden');
                    messageContainer.classList.add('flex', 'flex-col', 'justify-center');
                    finalMessage.innerText = "Qaddarullah, harap tidak berkecil hati. Ananda dapat mengikuti Ujian Munaqosyah pada semester depan. Silakan manfaatkan waktu tersebut untuk memaksimalkan perbaikan dan persiapan.";
                } else {
                    messageContainer.classList.add('hidden');
                    messageContainer.classList.remove('flex', 'flex-col', 'justify-center');
                }

                // Render Scores List
                const scoresListEl = document.getElementById('scores-list');
                if (materiList.length === 0) {
                    scoresListEl.innerHTML = '<p class="text-center text-gray-400 italic bg-white p-4 rounded-xl border border-gray-100">Belum ada materi ujian.</p>';
                } else {
                    let html = '';
                    materiList.forEach(materi => {
                        const score = scoresMap[materi.no];
                        const isScored = score !== undefined;
                        
                        let scoreColor = 'text-gray-400 bg-gray-50 border-gray-200';
                        if (isScored) {
                            scoreColor = score < kkm ? 'text-red-600 bg-red-50 border-red-200' : 'text-teal-700 bg-teal-50 border-teal-200';
                        }

                        html += `
                        <div class="flex items-center justify-between bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                            <div>
                                <h4 class="font-bold text-teal-950">${materi.nama}</h4>
                                <p class="text-[11px] text-gray-500">${typeof materi.ayat === 'number' ? materi.ayat + ' Ayat' : materi.ayat}</p>
                            </div>
                            <div class="w-14 h-10 flex items-center justify-center rounded-lg border font-black ${scoreColor}">
                                ${isScored ? score : '-'}
                            </div>
                        </div>`;
                    });
                    scoresListEl.innerHTML = html;
                }

                // Show Content
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = `<p class="text-red-600 font-bold bg-red-50 px-4 py-2 rounded-lg border border-red-200">Terjadi Kesalahan:<br>${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
